python:
  title: Python
  scopeNote: This inventory now targets Python's broad official stdlib module surface first, using runtime discovery where possible, rather than the full Python object model or third-party ecosystem.
  namespaceRules:
    - match: asyncio*
      default:
        decision: skip_runtime_model
        note: Event-loop and coroutine orchestration APIs revolve around runtime scheduling rather than plain values.
    - match: concurrent*
      default:
        decision: skip_runtime_model
        note: Executor and future APIs revolve around runtime scheduling rather than plain values.
    - match: multiprocessing*
      default:
        decision: skip_environment
        note: Process orchestration depends on host runtime and OS resources.
    - match: tkinter*
      default:
        decision: skip_environment
        note: UI toolkit modules depend on host display resources and event loops.
    - match: email*
      default:
        decision: skip_runtime_model
        note: Message object and policy-heavy email modules do not fit one stable plain-value contract by default.
    - match: http*
      default:
        decision: skip_environment
        note: HTTP client and server helpers depend on host network behavior.
    - match: urllib*
      default:
        decision: skip_environment
        note: Most urllib modules depend on network or response object behavior; parse helpers stay explicitly reviewed.
    - match: wsgiref*
      default:
        decision: skip_environment
        note: WSGI server helpers depend on network and host process behavior.
    - match: xml*
      default:
        decision: skip_runtime_model
        note: XML parser and DOM-style modules revolve around richer structured objects than one stable plain-value contract.
    - match: importlib*
      default:
        decision: skip_runtime_model
        note: Import-system modules revolve around loaders, specs, and runtime module state.
    - match: unittest*
      default:
        decision: skip_runtime_model
        note: Test framework modules revolve around classes, fixtures, and runner state rather than plain values.
    - match: dbm*
      default:
        decision: skip_environment
        note: DBM-backed key-value stores depend on host filesystem state.
    - match: curses*
      default:
        decision: skip_environment
        note: Terminal-control modules depend on host terminal capabilities and state.
    - match: os*
      default:
        decision: skip_environment
        note: OS helpers often depend on filesystem, processes, or host environment state.
    - match: socket*
      default:
        decision: skip_environment
        note: Socket APIs depend on host network behavior.
    - match: ssl
      default:
        decision: skip_environment
        note: TLS context and socket APIs depend on host network and certificate state.
    - match: subprocess
      default:
        decision: skip_environment
        note: Process execution depends on host environment and side effects.
    - match: ctypes
      default:
        decision: skip_plain_value_mismatch
        note: C interop and raw memory surfaces do not fit Locutus' current plain-value model.
    - match: datetime
      default:
        decision: skip_runtime_model
        note: Rich datetime objects do not fit one stable plain-value contract by default.
    - match: pathlib
      default:
        decision: skip_runtime_model
        note: Path object APIs revolve around richer path objects than plain strings by default.
    - match: encodings*
      default:
        decision: skip_low_value
        note: Codec registration modules are lower-value than direct text helper portability work.
    - match: ensurepip
      default:
        decision: skip_low_value
        note: Installer bootstrap tooling is outside Locutus' portability focus.
    - match: idlelib
      default:
        decision: skip_low_value
        note: IDE tooling is outside Locutus' portability focus.
    - match: turtledemo
      default:
        decision: skip_low_value
        note: Demo packages are outside Locutus' portability focus.
    - match: venv
      default:
        decision: skip_environment
        note: Virtual-environment tooling depends on host filesystem and interpreter state.
  namespaces:
    builtins:
      title: builtins module
      default:
        decision: skip_runtime_model
        note: Python builtins mix pure helpers with runtime introspection, evaluation, I/O, and rich container types too broadly for one direct Locutus wishlist.
      decisions:
        abs:
          decision: wanted
          note: Scalar absolute-value helpers are strong plain-value targets.
        all:
          decision: wanted
          note: Aggregate predicate helpers have a clean plain-value contract.
        any:
          decision: wanted
          note: Aggregate predicate helpers have a clean plain-value contract.
        ascii:
          decision: wanted
          note: ASCII-safe string representation is a useful plain-value helper.
        bin:
          decision: wanted
          note: Integer base conversion has a clean plain-value contract.
        bool:
          decision: wanted
          note: Boolean coercion remains a useful plain-value portability target.
        breakpoint:
          decision: skip_side_effects
          note: Debugger entry mutates runtime execution state.
        bytearray:
          decision: skip_plain_value_mismatch
          note: Mutable byte buffers do not fit Locutus' current plain-value model.
        bytes:
          decision: skip_plain_value_mismatch
          note: Byte strings do not fit Locutus' current plain-value model.
        callable:
          decision: wanted
          note: Callable predicates have a clean plain-value contract.
        chr:
          decision: wanted
          note: Codepoint-to-string conversion is a strong portability target.
        classmethod:
          decision: skip_runtime_model
          note: Descriptor factories are not plain-value targets.
        compile:
          decision: skip_security
          note: Dynamic code compilation is security-sensitive and not a good Locutus target.
        complex:
          decision: skip_plain_value_mismatch
          note: Complex numbers do not fit Locutus' current plain-value model.
        delattr:
          decision: skip_side_effects
          note: Attribute mutation is outside Locutus' value-only model.
        dict:
          decision: wanted
          note: Dictionary construction still has a clean plain-value contract.
        dir:
          decision: skip_runtime_model
          note: Runtime introspection depends on object model details outside Locutus' scope.
        divmod:
          decision: wanted
          note: Quotient-remainder helpers have a clean plain-value contract.
        enumerate:
          decision: wanted
          note: Indexed sequence pairing can be represented as plain arrays.
        eval:
          decision: skip_security
          note: Dynamic code evaluation is security-sensitive and out of scope.
        exec:
          decision: skip_security
          note: Dynamic code execution is security-sensitive and out of scope.
        filter:
          decision: wanted
          note: Predicate-based filtering remains a strong plain-value target.
        float:
          decision: wanted
          note: Numeric coercion has a clean plain-value contract.
        format:
          decision: wanted
          note: String formatting is a strong plain-value portability target.
        frozenset:
          decision: skip_plain_value_mismatch
          note: Set semantics do not map cleanly onto Locutus' plain-value model.
        getattr:
          decision: skip_runtime_model
          note: Generic attribute lookup depends on host object semantics.
        globals:
          decision: skip_runtime_model
          note: Runtime namespace introspection is outside Locutus' portability scope.
        hasattr:
          decision: skip_runtime_model
          note: Generic attribute introspection depends on host object semantics.
