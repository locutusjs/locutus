          decision: wanted
          note: Unix timestamp conversion has a clean plain-value contract.
      decisions:
        AfterFunc:
          decision: skip_side_effects
          note: Timer callbacks are side-effectful runtime scheduling APIs.
        Compare:
          decision: wanted
          note: Time comparison has a clean plain-value contract.
        LoadLocation:
          decision: skip_environment
          note: Timezone database loading depends on host runtime state.
        LoadLocationFromTZData:
          decision: skip_environment
          note: Timezone database loading depends on host runtime state.
    filepath:
