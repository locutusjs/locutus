        delete_if:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        keep_if:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        lazy:
          decision: skip_runtime_model
          note: Lazy enumerators do not fit Locutus' plain-value model.
        rehash:
          decision: skip_runtime_model
          note: Hash rehashing depends on Ruby's mutable identity semantics.
        replace:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        shift:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        store:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
