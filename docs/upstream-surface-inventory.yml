          note: Identity-based key semantics do not match plain JS object behavior.
        compare_by_identity?:
          decision: skip_runtime_model
          note: Identity-based key semantics do not match plain JS object behavior.
        default:
          decision: skip_runtime_model
          note: Default-proc semantics depend on mutable hash behavior and callable state.
        default=:
          decision: skip_side_effects
          note: Changing hash defaults mutates caller-owned state.
        default_proc:
          decision: skip_runtime_model
          note: Default-proc semantics depend on callable runtime state.
        default_proc=:
          decision: skip_side_effects
