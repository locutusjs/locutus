        xdiff_string_diff:
          decision: keep_extension
          note: xdiff is not available in the base PHP runtime target, but the port is still useful.
        xdiff_string_patch:
          decision: keep_extension
          note: xdiff is not available in the base PHP runtime target, but the port is still useful.

python:
  title: Python
  scopeNote: This inventory now tracks Python builtins plus a broad plain-value slice of the standard library, not the full standard library or object model.
  namespaces:
    builtins:
      title: builtins module
      default:
        decision: skip_runtime_model
        note: Python builtins mix pure helpers with runtime introspection, evaluation, I/O, and rich container types too broadly for one direct Locutus wishlist.
      decisions:
        abs:
          decision: wanted
          note: Scalar absolute-value helpers are strong plain-value targets.
        all:
          decision: wanted
          note: Aggregate predicate helpers have a clean plain-value contract.
        any:
          decision: wanted
          note: Aggregate predicate helpers have a clean plain-value contract.
        ascii:
          decision: wanted
          note: ASCII-safe string representation is a useful plain-value helper.
        bin:
          decision: wanted
          note: Integer base conversion has a clean plain-value contract.
        bool:
          decision: wanted
          note: Boolean coercion remains a useful plain-value portability target.
        breakpoint:
          decision: skip_side_effects
          note: Debugger entry mutates runtime execution state.
        bytearray:
          decision: skip_plain_value_mismatch
          note: Mutable byte buffers do not fit Locutus' current plain-value model.
        bytes:
          decision: skip_plain_value_mismatch
          note: Byte strings do not fit Locutus' current plain-value model.
        callable:
          decision: wanted
          note: Callable predicates have a clean plain-value contract.
        chr:
          decision: wanted
          note: Codepoint-to-string conversion is a strong portability target.
        classmethod:
          decision: skip_runtime_model
          note: Descriptor factories are not plain-value targets.
        compile:
          decision: skip_security
          note: Dynamic code compilation is security-sensitive and not a good Locutus target.
        complex:
          decision: skip_plain_value_mismatch
          note: Complex numbers do not fit Locutus' current plain-value model.
        delattr:
          decision: skip_side_effects
          note: Attribute mutation is outside Locutus' value-only model.
        dict:
          decision: wanted
          note: Dictionary construction still has a clean plain-value contract.
        dir:
          decision: skip_runtime_model
          note: Runtime introspection depends on object model details outside Locutus' scope.
        divmod:
          decision: wanted
          note: Quotient-remainder helpers have a clean plain-value contract.
        enumerate:
          decision: wanted
          note: Indexed sequence pairing can be represented as plain arrays.
        eval:
          decision: skip_security
          note: Dynamic code evaluation is security-sensitive and out of scope.
        exec:
          decision: skip_security
          note: Dynamic code execution is security-sensitive and out of scope.
        filter:
          decision: wanted
          note: Predicate-based filtering remains a strong plain-value target.
        float:
          decision: wanted
          note: Numeric coercion has a clean plain-value contract.
        format:
          decision: wanted
          note: String formatting is a strong plain-value portability target.
        frozenset:
          decision: skip_plain_value_mismatch
          note: Set semantics do not map cleanly onto Locutus' plain-value model.
        getattr:
          decision: skip_runtime_model
          note: Generic attribute lookup depends on host object semantics.
        globals:
          decision: skip_runtime_model
          note: Runtime namespace introspection is outside Locutus' portability scope.
        hasattr:
          decision: skip_runtime_model
          note: Generic attribute introspection depends on host object semantics.
        hash:
          decision: skip_runtime_model
          note: Object-hash identity does not map cleanly to JS plain values.
        hex:
          decision: wanted
          note: Integer base conversion has a clean plain-value contract.
        id:
          decision: skip_runtime_model
          note: Object identity addresses are not a stable portability target.
        input:
          decision: skip_environment
          note: Interactive stdin reads depend on host I/O.
        int:
          decision: wanted
          note: Integer coercion is a strong plain-value portability target.
        isinstance:
          decision: skip_runtime_model
          note: Python class introspection does not fit Locutus' plain-value model.
        issubclass:
          decision: skip_runtime_model
          note: Python class introspection does not fit Locutus' plain-value model.
        iter:
