      title: Base module
      default:
        decision: skip_runtime_model
        note: Julia Base is too broad and syntax- and runtime-heavy to treat as a general Locutus wishlist.
      decisions:
        clamp:
          decision: wanted
          note: Numeric boundary helpers have a clean plain-value contract.
        contains:
          decision: wanted
          note: String containment helpers are useful plain-value targets.
        replace:
          decision: wanted
          note: String replacement helpers are strong portability targets.
        reverse:
          decision: wanted
          note: String and collection reversal fits Locutus' plain-value model.
        split:
          decision: wanted
          note: String splitting is a high-value plain-value target.
        sqrt:
          decision: wanted
          note: Scalar math helpers remain useful cross-language portability targets.
        strip:
          decision: wanted
          note: Trimming helpers are strong plain-value targets.

ruby:
  title: Ruby
  scopeNote: This inventory currently tracks the highest-signal core collection, string, and math surfaces rather than all of Ruby.
  namespaces:
    Array:
      title: Array instance methods
      default:
        decision: wanted
        note: Most Ruby Array methods map naturally onto JS arrays and plain objects.
      rules:
        - match: 'each*'
          decision: skip_runtime_model
          note: Enumerator-driven iteration APIs are better expressed directly in JS.
      decisions:
        chain:
          decision: skip_runtime_model
          note: Lazy enumerator chaining is not a stable plain-value target.
        lazy:
          decision: skip_runtime_model
          note: Lazy enumerators do not fit Locutus' plain-value model.
        pack:
          decision: skip_plain_value_mismatch
          note: Binary packing semantics do not map cleanly to JS plain values.
        to_set:
          decision: skip_runtime_model
          note: Ruby Set values are not a stable plain-value target for Locutus.
    Enumerable:
      title: Enumerable instance methods
      default:
        decision: wanted
        note: Most Enumerable transforms can be represented over arrays and plain values.
      rules:
        - match: 'each*'
          decision: skip_runtime_model
          note: Enumerator-driven iteration APIs are better expressed directly in JS.
      decisions:
        chain:
          decision: skip_runtime_model
          note: Lazy enumerator chaining is not a stable plain-value target.
        cycle:
          decision: skip_runtime_model
          note: Potentially unbounded iteration does not fit Locutus' plain-value model.
        lazy:
          decision: skip_runtime_model
          note: Lazy enumerators do not fit Locutus' plain-value model.
        to_set:
          decision: skip_runtime_model
          note: Ruby Set values are not a stable plain-value target for Locutus.
    Hash:
      title: Hash instance methods
      default:
        decision: wanted
        note: Hash readers and pure transforms often map cleanly onto JS objects and entry arrays.
      rules:
        - match: '*!'
          decision: skip_side_effects
          note: Bang methods mutate caller-owned hash state.
        - match: 'each*'
          decision: skip_runtime_model
          note: Enumerator-driven iteration APIs are better expressed directly in JS.
      decisions:
        chain:
          decision: skip_runtime_model
          note: Lazy enumerator chaining is not a stable plain-value target.
        clear:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        compare_by_identity:
          decision: skip_runtime_model
          note: Identity-based key semantics do not match plain JS object behavior.
        compare_by_identity?:
          decision: skip_runtime_model
          note: Identity-based key semantics do not match plain JS object behavior.
        default:
          decision: skip_runtime_model
          note: Default-proc semantics depend on mutable hash behavior and callable state.
        default=:
          decision: skip_side_effects
          note: Changing hash defaults mutates caller-owned state.
        default_proc:
          decision: skip_runtime_model
          note: Default-proc semantics depend on callable runtime state.
        default_proc=:
          decision: skip_side_effects
          note: Changing hash defaults mutates caller-owned state.
        delete:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        delete_if:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        keep_if:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        lazy:
          decision: skip_runtime_model
          note: Lazy enumerators do not fit Locutus' plain-value model.
        rehash:
          decision: skip_runtime_model
          note: Hash rehashing depends on Ruby's mutable identity semantics.
        replace:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        shift:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        store:
          decision: skip_side_effects
          note: Hash mutation is outside Locutus' value-only model.
        to_set:
          decision: skip_runtime_model
          note: Ruby Set values are not a stable plain-value target for Locutus.
    String:
      title: String instance methods
      default:
        decision: wanted
        note: Most Ruby String methods are strong plain-value portability targets.
      rules:
        - match: 'byte*'
          decision: skip_plain_value_mismatch
          note: Byte-oriented string APIs do not fit Locutus' current plain-value model.
        - match: 'each_*'
          decision: skip_runtime_model
          note: Enumerator-driven iteration APIs are better expressed directly in JS.
        - match: 'encode*'
          decision: skip_runtime_model
          note: Encoding-object semantics do not fit Locutus' plain-value model.
      decisions:
        b:
          decision: skip_low_value
          note: Ruby's binary-string clone helper adds little value in JS.
        crypt:
          decision: skip_security
          note: Password-hash wrappers are security-sensitive and not a good Locutus target.
        encoding:
          decision: skip_runtime_model
          note: Encoding objects are not a stable plain-value target.
        force_encoding:
          decision: skip_runtime_model
          note: Encoding mutation does not fit Locutus' plain-value model.
        intern:
          decision: skip_runtime_model
          note: Symbol-table interning does not fit Locutus' plain-value model.
    Math:
      title: Math module methods
      default:
        decision: wanted
        note: Ruby Math helpers map cleanly to JS numbers.

