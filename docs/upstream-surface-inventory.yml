awk:
  title: AWK
  namespaces:
    builtin:
      title: Built-in functions
      default:
        decision: wanted
        note: AWK built-ins are mostly pure text and numeric helpers with a good plain-value fit.
      decisions:
        close:
          decision: skip_side_effects
          note: File and pipe handle lifecycle is outside Locutus' value-only model.
        srand:
          decision: skip_side_effects
          note: Global RNG seeding mutates ambient runtime state.
        system:
          decision: skip_side_effects
          note: Shell execution is outside Locutus' portability scope.

c:
  title: C
  namespaces:
    ctype:
      title: ctype.h
      default:
        decision: wanted
        note: Character classification helpers map cleanly to plain strings and numbers.
    math:
      title: math.h
      default:
        decision: wanted
        note: Scalar math helpers are strong plain-value portability targets.
    stdio:
      title: stdio.h
      default:
        decision: skip_side_effects
        note: stdio printing APIs are primarily output sinks rather than plain-value helpers.
      decisions:
        snprintf:
          decision: wanted
          note: Sized string formatting still produces a plain string result.
        vsnprintf:
          decision: wanted
          note: Variadic string formatting still yields a plain string result.
        vsprintf:
          decision: wanted
          note: Variadic string formatting still yields a plain string result.
    stdlib:
      title: stdlib.h
      default:
        decision: wanted
        note: Scalar conversion and numeric helpers are good portability targets.
      decisions:
        getenv:
          decision: skip_environment
          note: Process environment lookup depends on host state outside Locutus' model.
        qsort:
          decision: skip_runtime_model
          note: In-place comparator-driven sorting does not map cleanly to plain JS values.
        srand:
          decision: skip_side_effects
          note: Global RNG seeding mutates ambient runtime state.
    string:
      title: string.h
      default:
        decision: skip_plain_value_mismatch
        note: C buffer and pointer-oriented string APIs do not generally map cleanly to JS plain values.
      decisions:
        strncmp:
          decision: wanted
          note: Prefix-bounded string comparison still has a clean plain-value contract.
        strcspn:
          decision: wanted
          note: Character-class span helpers are useful for string scanning.
        strpbrk:
          decision: wanted
          note: Character-class search maps naturally to string scanning.
        strrchr:
          decision: wanted
          note: Last-occurrence search maps naturally to string lookup.
        strspn:
          decision: wanted
          note: Character-class span helpers are useful for string scanning.
        strtok:
          decision: skip_runtime_model
          note: Stateful tokenizer semantics do not fit Locutus' plain-value model.

php:
  title: PHP
  namespaces:
    __global:
      title: Global functions
      default:
        decision: skip_runtime_model
        note: The PHP global surface is broad and many entries depend on runtime objects, host state, or side-effectful process behavior.
      rules:
        - match: 'curl_*'
          decision: skip_environment
          note: Network-bound cURL helpers depend on host I/O and runtime handles.
        - match: 'header*'
          decision: skip_side_effects
          note: HTTP header emission mutates response state outside Locutus' model.
        - match: 'http_response_*'
          decision: skip_side_effects
          note: Response-status mutation is outside Locutus' portability focus.
        - match: 'image*'
          decision: skip_plain_value_mismatch
          note: GD image resources do not fit Locutus' plain-value model.
        - match: 'mail'
          decision: skip_side_effects
          note: Mail dispatch is an external side effect.
        - match: 'ob_*'
          decision: skip_side_effects
          note: Output buffering mutates ambient process output state.
        - match: 'openssl_*'
          decision: skip_security
          note: OpenSSL resource and key-management helpers are security-sensitive and environment-bound.
        - match: 'posix_*'
          decision: skip_environment
          note: POSIX process and host helpers depend on OS-specific state.
        - match: 'proc_*'
          decision: skip_side_effects
          note: Process-spawning helpers are outside Locutus' portability scope.
        - match: 'session_*'
          decision: skip_side_effects
          note: Session lifecycle helpers mutate ambient process or HTTP state.
        - match: 'socket_*'
          decision: skip_environment
          note: Socket helpers depend on external network state and resource handles.
        - match: 'stream_*'
          decision: skip_environment
          note: Stream resource helpers depend on host I/O handles and runtime state.
        - match: 'symlink'
          decision: skip_side_effects
          note: Filesystem mutation is outside Locutus' portability focus.
        - match: 'syslog'
          decision: skip_side_effects
          note: System logging is an external side effect.
        - match: 'xml_*'
          decision: skip_plain_value_mismatch
          note: XML parser resources and callbacks do not fit Locutus' plain-value model.
        - match: 'array_*'
          decision: wanted
          note: PHP array helpers are high-value portability targets and map well onto JS arrays and plain objects.
        - match: 'date_*'
          decision: wanted
          note: Date helpers remain high-value portability targets within Locutus' Date-based model.
        - match: 'hash_*'
          decision: wanted
          note: Hashing helpers are useful pure-value utilities.
        - match: 'json_*'
          decision: wanted
          note: JSON helpers are strong plain-value portability targets.
        - match: 'preg_*'
          decision: wanted
          note: Regular-expression helpers are high-value portability targets.
        - match: 'str*'
          decision: wanted
          note: String helpers are core portability targets for Locutus.
      decisions:
        assert:
          decision: skip_runtime_model
          note: Runtime assertion configuration is not a good portability target.
        bcadd:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bccomp:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcdiv:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcmul:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcround:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcscale:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcsub:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        chdir:
          decision: skip_side_effects
          note: Process-wide working-directory mutation is outside Locutus' value-only model.
        checkdnsrr:
          decision: skip_environment
          note: Network and environment dependent behavior is outside the portability focus.
        chgrp:
          decision: skip_side_effects
          note: Filesystem ownership mutation is outside the portability focus.
        chmod:
          decision: skip_side_effects
          note: Filesystem permission mutation is outside the portability focus.
        chown:
          decision: skip_side_effects
          note: Filesystem ownership mutation is outside the portability focus.
        chroot:
          decision: skip_side_effects
          note: Process and filesystem sandbox mutation is outside the portability focus.
        class_alias:
          decision: skip_runtime_model
          note: Runtime class-table mutation is not a good fit for Locutus' plain-value model.
        class_exists:
          decision: skip_runtime_model
          note: Class-table introspection depends on runtime object state.
        class_implements:
          decision: skip_runtime_model
          note: Class-table introspection depends on runtime object state.
        class_parents:
          decision: skip_runtime_model
          note: Class-table introspection depends on runtime object state.
        class_uses:
          decision: skip_runtime_model
          note: Class-table introspection depends on runtime object state.
        cli_get_process_title:
          decision: skip_environment
          note: Process metadata depends on host runtime state.
        cli_set_process_title:
          decision: skip_side_effects
          note: Process metadata mutation is outside Locutus' value-only model.
        compact:
          decision: skip_runtime_model
          note: Scope-variable extraction has no honest plain-value JS equivalent.
        connection_aborted:
          decision: skip_environment
          note: HTTP connection state depends on runtime server environment.
        connection_status:
          decision: skip_environment
          note: HTTP connection state depends on runtime server environment.
        constant:
          decision: skip_runtime_model
          note: Runtime constant-table lookup depends on language environment state.
        convert_cyr_string:
          decision: keep_legacy
          note: Removed upstream in PHP 8.0, but retained as a legacy compatibility port.
        curl_multi_select:
          decision: skip_environment
          note: Network multiplexing depends on runtime socket state.
        disk_free_space:
          decision: skip_environment
          note: Filesystem capacity depends on host state.
        disk_total_space:
          decision: skip_environment
          note: Filesystem capacity depends on host state.
        diskfreespace:
          decision: skip_environment
          note: Filesystem capacity depends on host state.
        dl:
          decision: skip_security
          note: Runtime extension loading is security-sensitive and host-dependent.
        dns_check_record:
          decision: skip_environment
          note: DNS queries depend on external network state.
        dns_get_mx:
          decision: skip_environment
          note: DNS queries depend on external network state.
        dns_get_record:
          decision: skip_environment
          note: DNS queries depend on external network state.
        each:
          decision: keep_legacy
          note: Removed upstream in PHP 8.0, but retained as a legacy compatibility port.
        echo:
          decision: keep_language_construct
          note: Modeled pragmatically even though it is a language construct rather than a callable function.
        empty:
          decision: keep_language_construct
          note: Modeled pragmatically even though it is a language construct rather than a callable function.
        enum_exists:
          decision: skip_runtime_model
          note: Runtime enum-table introspection depends on language environment state.
        exec:
          decision: skip_security
          note: Shell execution is outside Locutus' security model.
        file_put_contents:
          decision: skip_side_effects
          note: Filesystem writes are side effects outside Locutus' portability focus.
        fopen:
          decision: skip_environment
          note: Stream resource creation depends on host I/O state.
        gopher_parsedir:
          decision: keep_locutus_only
          note: Niche Locutus-only port intentionally retained.
        hash:
          decision: wanted
          note: Generic hashing helpers are useful plain-value utilities.
        i18n_loc_get_default:
          decision: keep_extension
          note: Intl helper retained even though it is not exposed by the base runtime target.
        i18n_loc_set_default:
          decision: keep_extension
          note: Intl helper retained even though it is not exposed by the base runtime target.
        is_binary:
          decision: keep_legacy
          note: Legacy alias retained for compatibility with older PHP-oriented code.
        is_buffer:
          decision: keep_legacy
          note: Legacy alias retained for compatibility with older PHP-oriented code.
        is_real:
          decision: keep_legacy
          note: Legacy alias retained for compatibility with older PHP-oriented code.
        is_unicode:
          decision: keep_legacy
          note: Legacy alias retained for compatibility with older PHP-oriented code.
        isset:
          decision: keep_language_construct
          note: Modeled pragmatically even though it is a language construct rather than a callable function.
        money_format:
          decision: keep_legacy
          note: Removed upstream in PHP 8.0, but retained as a legacy compatibility port.
        passthru:
          decision: skip_security
          note: Shell execution is outside Locutus' security model.
        putenv:
          decision: skip_side_effects
          note: Process environment mutation is outside Locutus' portability focus.
        shell_exec:
          decision: skip_security
          note: Shell execution is outside Locutus' security model.
        split:
          decision: keep_legacy
          note: Removed upstream in PHP 7.0, but retained as a legacy compatibility port.
        sql_regcase:
          decision: keep_legacy
          note: Removed upstream in PHP 7.0, but retained as a legacy compatibility port.
        system:
          decision: skip_security
          note: Shell execution is outside Locutus' security model.
        xdiff_string_diff:
          decision: keep_extension
          note: xdiff is not available in the base PHP runtime target, but the port is still useful.
        xdiff_string_patch:
          decision: keep_extension
          note: xdiff is not available in the base PHP runtime target, but the port is still useful.

python:
  title: Python
  scopeNote: This inventory currently tracks a growing plain-value slice of the Python standard library, not all of Python yet.
  namespaces:
    bisect:
      title: bisect module
      default:
        decision: wanted
        note: Binary-search helpers are strong plain-value portability targets.
      decisions:
        insort:
          decision: skip_side_effects
          note: In-place list insertion mutates caller-owned state.
        insort_left:
          decision: skip_side_effects
          note: In-place list insertion mutates caller-owned state.
        insort_right:
          decision: skip_side_effects
          note: In-place list insertion mutates caller-owned state.
    functools:
      title: functools module
      default:
        decision: skip_runtime_model
        note: Most functools exports are decorators, wrappers, or callable factories rather than plain values.
      decisions:
        reduce:
          decision: wanted
          note: Left-folding over plain iterables is a strong portability target.
    itertools:
      title: itertools module
      default:
        decision: skip_runtime_model
        note: Many itertools helpers are lazy or stateful iterator factories rather than direct plain values.
      decisions:
        accumulate:
          decision: wanted
          note: Accumulation over plain iterables can be represented as arrays of intermediate results.
        batched:
          decision: wanted
          note: Fixed-size chunking is a strong plain-value portability target.
        chain:
          decision: wanted
          note: Sequence concatenation maps naturally onto arrays.
        combinations:
          decision: wanted
          note: Finite combinatorics helpers can be represented as arrays of tuples.
        combinations_with_replacement:
          decision: wanted
          note: Finite combinatorics helpers can be represented as arrays of tuples.
        compress:
          decision: wanted
          note: Mask-based filtering has a clean plain-value contract.
        dropwhile:
          decision: wanted
          note: Predicate-based slicing has a clean plain-value contract.
        filterfalse:
          decision: wanted
          note: Predicate-based filtering has a clean plain-value contract.
        islice:
          decision: wanted
          note: Iterator slicing maps naturally onto array slicing semantics.
        pairwise:
          decision: wanted
          note: Adjacent-pair grouping can be represented as arrays of tuples.
        permutations:
          decision: wanted
          note: Finite combinatorics helpers can be represented as arrays of tuples.
        product:
          decision: wanted
          note: Cartesian products can be represented as arrays of tuples.
        starmap:
          decision: wanted
          note: Spread-argument mapping still has a clean plain-value contract.
        takewhile:
          decision: wanted
          note: Predicate-based slicing has a clean plain-value contract.
        zip_longest:
          decision: wanted
          note: Sequence zipping has a strong plain-value contract.
    math:
      title: math module
      default:
        decision: wanted
        note: Python math helpers map cleanly to JS numbers and arrays.
    operator:
      title: operator module
      default:
        decision: wanted
        note: First-class operator helpers are strong plain-value portability targets.
      decisions:
        attrgetter:
          decision: skip_runtime_model
          note: Getter factories return callable objects rather than plain values.
        call:
          decision: skip_runtime_model
          note: Indirect call wrappers add little value beyond direct JS invocation.
        delitem:
          decision: skip_side_effects
          note: Container mutation is outside Locutus' value-only model.
        iadd:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        iand:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        iconcat:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        ifloordiv:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        ilshift:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        imatmul:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        imod:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        imul:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        ior:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        ipow:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        irshift:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        isub:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        itemgetter:
          decision: skip_runtime_model
          note: Getter factories return callable objects rather than plain values.
        itruediv:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        ixor:
          decision: skip_side_effects
          note: In-place operator wrappers imply mutation semantics.
        length_hint:
          decision: skip_low_value
          note: Size-hint probing adds little value beyond direct JS length checks.
        methodcaller:
          decision: skip_runtime_model
          note: Method-caller factories return callable objects rather than plain values.
        setitem:
          decision: skip_side_effects
          note: Container mutation is outside Locutus' value-only model.
    re:
      title: re module
      default:
        decision: wanted
        note: Top-level regex helpers are high-value portability targets.
      decisions:
        compile:
          decision: skip_runtime_model
          note: Compiled regex objects are not a stable plain-value target.
        error:
          decision: skip_runtime_model
          note: Exception types are not standalone plain-value portability targets.
        purge:
          decision: skip_runtime_model
          note: Regex cache mutation is outside Locutus' portability scope.
        template:
          decision: skip_runtime_model
          note: Template pattern objects are not a stable plain-value target.
    string:
      title: string module
      decisions: {}
    difflib:
      title: difflib module
      default:
        decision: wanted
        note: Sequence-diff helpers are high-value portability targets.
      decisions:
        diff_bytes:
          decision: skip_plain_value_mismatch
          note: Byte-oriented diffing does not fit Locutus' current plain-value model.
    statistics:
      title: statistics module
      default:
        decision: wanted
        note: Aggregate statistics helpers are strong plain-value portability targets.

julia:
