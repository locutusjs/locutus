awk:
  title: AWK
  namespaces:
    builtin:
      title: Built-in functions
      default:
        decision: wanted
        note: AWK built-ins are mostly pure text and numeric helpers with a good plain-value fit.
      decisions:
        close:
          decision: skip_side_effects
          note: File and pipe handle lifecycle is outside Locutus' value-only model.
        srand:
          decision: skip_side_effects
          note: Global RNG seeding mutates ambient runtime state.
        system:
          decision: skip_side_effects
          note: Shell execution is outside Locutus' portability scope.
haskell:
  title: Haskell
  scopeNote: This inventory now tracks a broader official `base` module slice for Haskell's core plain-value helpers, not the wider Hackage ecosystem.
  namespaceRules:
    - match: Control.*
      default:
        decision: skip_runtime_model
        note: Control.* modules are dominated by typeclass-heavy abstractions and higher-order runtime composition.
    - match: Data.*
      default:
        decision: skip_runtime_model
        note: Most Data.* modules revolve around algebraic data types and typeclass-heavy APIs beyond one stable plain-value contract.
    - match: Debug.*
      default:
        decision: skip_runtime_model
        note: Debugging helpers are not strong plain-value portability targets.
    - match: Foreign.*
      default:
        decision: skip_environment
        note: Foreign-function interfaces depend on native memory and host runtime behavior.
    - match: GHC.*
      default:
        decision: skip_runtime_model
        note: GHC-internal modules are compiler- and runtime-oriented rather than plain-value portability targets.
    - match: Prelude
      default:
        decision: skip_runtime_model
        note: Prelude mixes syntax, typeclasses, and runtime behavior too broadly for one direct Locutus wishlist.
    - match: Foreign
      default:
        decision: skip_environment
        note: Foreign interfaces depend on native memory and host runtime behavior.
    - match: Numeric
      default:
        decision: wanted
        note: Numeric formatting and base-conversion helpers are strong portability targets.
    - match: Numeric.*
      default:
        decision: wanted
        note: Numeric helper modules are strong scalar and formatting portability targets.
    - match: System.*
      default:
        decision: skip_environment
        note: System.* modules depend on host I/O, process, or filesystem state.
    - match: Text.*
      default:
        decision: skip_runtime_model
        note: Text parser and pretty-print families revolve around richer runtime models than one stable plain-value contract.
    - match: Type.*
      default:
        decision: skip_runtime_model
        note: Type-level helpers are not plain-value portability targets.
    - match: Unsafe.*
      default:
        decision: skip_security
        note: Unsafe runtime escape hatches are outside Locutus' security model.
  defaultNamespace:
    default:
      decision: skip_runtime_model
      note: Newly tracked Haskell base modules default conservative until their plain-value portability story is explicitly reviewed.
  namespaces:
    Data.Char:
      title: Data.Char
      default:
        decision: wanted
        note: Character classification and case helpers are strong Haskell plain-value portability targets.
      rules:
        - match: C*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: D*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: E*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: F*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: G*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: I*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: L*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: M*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: N*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: O*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: P*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: S*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: T*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
        - match: U*
          decision: skip_runtime_model
          note: Type and category exports are runtime/model declarations rather than direct plain-value helpers.
    Numeric.Natural:
      title: Numeric.Natural
      default:
        decision: wanted
        note: Numeric helper modules are strong scalar and formatting portability targets.
      decisions:
        Natural:
          decision: skip_runtime_model
          note: Type exports are runtime/model declarations rather than direct plain-value helpers.
    Data.Either:
      title: Data.Either
      default:
        decision: skip_runtime_model
        note: Sum-type wrappers do not map directly to one stable plain-value contract.
      decisions:
        either:
          decision: wanted
          note: Branching over plain values still has a useful portability contract.
        isLeft:
          decision: wanted
          note: Sum-type predicates have a clean plain-value contract.
        isRight:
          decision: wanted
          note: Sum-type predicates have a clean plain-value contract.
    Data.List:
      title: Data.List
      default:
        decision: wanted
        note: Pure list transforms and combinatorics helpers are strong plain-value portability targets.
    Data.Maybe:
      title: Data.Maybe
      default:
        decision: skip_runtime_model
        note: Maybe wrappers do not map directly to one stable plain-value contract.
      decisions:
        catMaybes:
          decision: wanted
          note: Null-filtering helpers have a clean plain-value contract.
        fromMaybe:
          decision: wanted
          note: Defaulting helpers have a clean plain-value contract.
        isJust:
          decision: wanted
          note: Optional-value predicates have a clean plain-value contract.
        isNothing:
          decision: wanted
          note: Optional-value predicates have a clean plain-value contract.
        mapMaybe:
          decision: wanted
          note: Combined map-filter helpers are strong plain-value targets.
        maybe:
          decision: wanted
          note: Optional branching over plain values has a clean contract.
    Numeric:
      title: Numeric
      default:
        decision: wanted
        note: Base-conversion and numeric-format helpers are strong portability targets.
      decisions:
        Floating:
          decision: skip_runtime_model
          note: Typeclass and declaration exports are runtime/model declarations rather than direct plain-value helpers.
        class:
          decision: skip_runtime_model
          note: Typeclass and declaration exports are runtime/model declarations rather than direct plain-value helpers.
    Data.Tuple:
      title: Data.Tuple
      default:
        decision: wanted
        note: Tuple projection and transformation helpers map cleanly to plain arrays.
    Data.Bool:
      title: Data.Bool
      default:
        decision: wanted
        note: Boolean branching helpers have a clean plain-value contract.
      rules:
        - match: B*
          decision: skip_runtime_model
          note: Type and constructor exports are runtime/model declarations rather than direct plain-value helpers.
        - match: F*
          decision: skip_runtime_model
          note: Type and constructor exports are runtime/model declarations rather than direct plain-value helpers.
        - match: T*
          decision: skip_runtime_model
          note: Type and constructor exports are runtime/model declarations rather than direct plain-value helpers.
    Data.Function:
      title: Data.Function
      default:
        decision: skip_runtime_model
        note: Higher-order function combinators are less compelling than direct JS equivalents by default.
      decisions:
        on:
          decision: wanted
          note: Comparator and projection composition still has a useful plain-value portability contract.
    Data.Ord:
      title: Data.Ord
      default:
        decision: wanted
        note: Ordering helpers over plain values are strong Haskell portability targets.
c:
  title: C
  defaultNamespace:
    default:
      decision: skip_runtime_model
      note: Newly tracked C headers default conservative until their plain-value portability story is explicitly reviewed.
  namespaces:
    ctype:
      title: ctype.h
      default:
        decision: wanted
        note: Character classification helpers map cleanly to plain strings and numbers.
    math:
      title: math.h
      default:
        decision: wanted
        note: Scalar math helpers are strong plain-value portability targets.
    stdio:
      title: stdio.h
      default:
        decision: skip_side_effects
        note: stdio printing APIs are primarily output sinks rather than plain-value helpers.
      decisions:
        snprintf:
          decision: wanted
          note: Sized string formatting still produces a plain string result.
        vsnprintf:
          decision: wanted
          note: Variadic string formatting still yields a plain string result.
        vsprintf:
          decision: wanted
          note: Variadic string formatting still yields a plain string result.
    stdlib:
      title: stdlib.h
      default:
        decision: wanted
        note: Scalar conversion and numeric helpers are good portability targets.
      decisions:
        getenv:
          decision: skip_environment
          note: Process environment lookup depends on host state outside Locutus' model.
        qsort:
          decision: skip_runtime_model
          note: In-place comparator-driven sorting does not map cleanly to plain JS values.
        srand:
          decision: skip_side_effects
          note: Global RNG seeding mutates ambient runtime state.
    string:
      title: string.h
      default:
        decision: skip_plain_value_mismatch
        note: C buffer and pointer-oriented string APIs do not generally map cleanly to JS plain values.
      decisions:
        strncmp:
          decision: wanted
          note: Prefix-bounded string comparison still has a clean plain-value contract.
        strcspn:
          decision: wanted
          note: Character-class span helpers are useful for string scanning.
        strpbrk:
          decision: wanted
          note: Character-class search maps naturally to string scanning.
        strrchr:
          decision: wanted
          note: Last-occurrence search maps naturally to string lookup.
        strspn:
          decision: wanted
          note: Character-class span helpers are useful for string scanning.
        strtok:
          decision: skip_runtime_model
          note: Stateful tokenizer semantics do not fit Locutus' plain-value model.
php:
  title: PHP
  namespaces:
    __global:
      title: Global functions
      default:
        decision: skip_runtime_model
        note: The PHP global surface is broad and many entries depend on runtime objects, host state, or side-effectful process behavior.
      rules:
        - match: curl_*
          decision: skip_environment
          note: Network-bound cURL helpers depend on host I/O and runtime handles.
        - match: header*
          decision: skip_side_effects
          note: HTTP header emission mutates response state outside Locutus' model.
        - match: http_response_*
          decision: skip_side_effects
          note: Response-status mutation is outside Locutus' portability focus.
        - match: image*
          decision: skip_plain_value_mismatch
          note: GD image resources do not fit Locutus' plain-value model.
        - match: mail
          decision: skip_side_effects
          note: Mail dispatch is an external side effect.
        - match: ob_*
          decision: skip_side_effects
          note: Output buffering mutates ambient process output state.
        - match: openssl_*
          decision: skip_security
          note: OpenSSL resource and key-management helpers are security-sensitive and environment-bound.
        - match: posix_*
          decision: skip_environment
          note: POSIX process and host helpers depend on OS-specific state.
        - match: proc_*
          decision: skip_side_effects
          note: Process-spawning helpers are outside Locutus' portability scope.
        - match: session_*
          decision: skip_side_effects
          note: Session lifecycle helpers mutate ambient process or HTTP state.
        - match: socket_*
          decision: skip_environment
          note: Socket helpers depend on external network state and resource handles.
        - match: stream_*
          decision: skip_environment
          note: Stream resource helpers depend on host I/O handles and runtime state.
        - match: symlink
          decision: skip_side_effects
          note: Filesystem mutation is outside Locutus' portability focus.
        - match: syslog
          decision: skip_side_effects
          note: System logging is an external side effect.
        - match: xml_*
          decision: skip_plain_value_mismatch
          note: XML parser resources and callbacks do not fit Locutus' plain-value model.
        - match: array_*
          decision: wanted
          note: PHP array helpers are high-value portability targets and map well onto JS arrays and plain objects.
        - match: date_*
          decision: wanted
          note: Date helpers remain high-value portability targets within Locutus' Date-based model.
        - match: hash_*
          decision: wanted
          note: Hashing helpers are useful pure-value utilities.
        - match: json_*
          decision: wanted
          note: JSON helpers are strong plain-value portability targets.
        - match: preg_*
          decision: wanted
          note: Regular-expression helpers are high-value portability targets.
        - match: str*
          decision: wanted
          note: String helpers are core portability targets for Locutus.
      decisions:
        assert:
          decision: skip_runtime_model
          note: Runtime assertion configuration is not a good portability target.
        bcadd:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bccomp:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcdiv:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcmul:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcround:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcscale:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        bcsub:
          decision: keep_extension
          note: bcmath is not enabled in the base PHP runtime target, but the port is still useful.
        chdir:
          decision: skip_side_effects
          note: Process-wide working-directory mutation is outside Locutus' value-only model.
        checkdnsrr:
          decision: skip_environment
          note: Network and environment dependent behavior is outside the portability focus.
        chgrp:
          decision: skip_side_effects
          note: Filesystem ownership mutation is outside the portability focus.
        chmod:
          decision: skip_side_effects
          note: Filesystem permission mutation is outside the portability focus.
        chown:
          decision: skip_side_effects
          note: Filesystem ownership mutation is outside the portability focus.
        chroot:
          decision: skip_side_effects
          note: Process and filesystem sandbox mutation is outside the portability focus.
        class_alias:
          decision: skip_runtime_model
          note: Runtime class-table mutation is not a good fit for Locutus' plain-value model.
        class_exists:
          decision: skip_runtime_model
          note: Class-table introspection depends on runtime object state.
        class_implements:
          decision: skip_runtime_model
          note: Class-table introspection depends on runtime object state.
        class_parents:
          decision: skip_runtime_model
          note: Class-table introspection depends on runtime object state.
        class_uses:
          decision: skip_runtime_model
          note: Class-table introspection depends on runtime object state.
        cli_get_process_title:
          decision: skip_environment
          note: Process metadata depends on host runtime state.
        cli_set_process_title:
          decision: skip_side_effects
          note: Process metadata mutation is outside Locutus' value-only model.
        compact:
          decision: skip_runtime_model
          note: Scope-variable extraction has no honest plain-value JS equivalent.
        connection_aborted:
          decision: skip_environment
          note: HTTP connection state depends on runtime server environment.
        connection_status:
          decision: skip_environment
          note: HTTP connection state depends on runtime server environment.
        constant:
          decision: skip_runtime_model
          note: Runtime constant-table lookup depends on language environment state.
        convert_cyr_string:
          decision: keep_legacy
          note: Removed upstream in PHP 8.0, but retained as a legacy compatibility port.
        curl_multi_select:
          decision: skip_environment
          note: Network multiplexing depends on runtime socket state.
        disk_free_space:
          decision: skip_environment
          note: Filesystem capacity depends on host state.
        disk_total_space:
          decision: skip_environment
          note: Filesystem capacity depends on host state.
        diskfreespace:
          decision: skip_environment
          note: Filesystem capacity depends on host state.
        dl:
          decision: skip_security
          note: Runtime extension loading is security-sensitive and host-dependent.
        dns_check_record:
          decision: skip_environment
          note: DNS queries depend on external network state.
        dns_get_mx:
          decision: skip_environment
          note: DNS queries depend on external network state.
        dns_get_record:
          decision: skip_environment
          note: DNS queries depend on external network state.
        each:
          decision: keep_legacy
          note: Removed upstream in PHP 8.0, but retained as a legacy compatibility port.
        echo:
          decision: keep_language_construct
          note: Modeled pragmatically even though it is a language construct rather than a callable function.
        empty:
          decision: keep_language_construct
          note: Modeled pragmatically even though it is a language construct rather than a callable function.
        enum_exists:
          decision: skip_runtime_model
          note: Runtime enum-table introspection depends on language environment state.
        exec:
